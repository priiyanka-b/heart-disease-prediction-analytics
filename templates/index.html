<!DOCTYPE html>
<html>
<head>
<title>Heart Disease Risk Predictor</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body style="background-color:#f5f7fa;">

<div class="container mt-5">

<h2 class="text-center mb-4">❤️ Heart Disease Risk Predictor</h2>

<div class="card shadow p-4">

<form action="/predict" method="post">

<div class="row">

<div class="col-md-6 mb-3">
<label>Age</label>
<input type="number" name="age" class="form-control" required>
</div>

<div class="col-md-6 mb-3">
<label>Gender</label>
<select name="gender" class="form-control">
<option value="1">Male</option>
<option value="0">Female</option>
</select>
</div>

<div class="col-md-6 mb-3">
<label>Height (cm)</label>
<input type="number" name="height" class="form-control">
</div>

<div class="col-md-6 mb-3">
<label>Weight (kg)</label>
<input type="number" name="weight" class="form-control">
</div>

<div class="col-md-6 mb-3">
<label>Systolic BP</label>
<input type="number" name="ap_hi" class="form-control">
</div>

<div class="col-md-6 mb-3">
<label>Diastolic BP</label>
<input type="number" name="ap_lo" class="form-control">
</div>

<div class="col-md-6 mb-3">
<label>Cholesterol</label>
<select name="cholesterol" class="form-control">
<option value="1">Normal</option>
<option value="2">Above Normal</option>
<option value="3">Well Above Normal</option>
</select>
</div>

<div class="col-md-6 mb-3">
<label>Glucose</label>
<select name="gluc" class="form-control">
<option value="1">Normal</option>
<option value="2">Above Normal</option>
<option value="3">Well Above Normal</option>
</select>
</div>

<div class="col-md-6 mb-3">
<label>Smoking</label>
<select name="smoke" class="form-control">
<option value="0">No</option>
<option value="1">Yes</option>
</select>
</div>

<div class="col-md-6 mb-3">
<label>Alcohol</label>
<select name="alco" class="form-control">
<option value="0">No</option>
<option value="1">Yes</option>
</select>
</div>

<div class="col-md-6 mb-3">
<label>Physically Active</label>
<select name="active" class="form-control">
<option value="1">Yes</option>
<option value="0">No</option>
</select>
</div>

</div>

<div class="text-center mt-3">
<button class="btn btn-danger btn-lg">Predict Risk</button>
</div>

</form>

{% if prediction %}

<div class="alert alert-info mt-4 text-center">

<h4>Prediction Result</h4>

<h2>{{ prediction }}</h2>

</div>

{% endif %}

</div>

</div>

</body>
</html>
